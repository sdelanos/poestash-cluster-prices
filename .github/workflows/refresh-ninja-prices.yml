name: Refresh Ninja Prices
on:
  schedule:
    # Every 20 minutes — each run fetches all poe.ninja categories and
    # batch-upserts ~40k rows. Completes in ~15 seconds.
    - cron: '*/20 * * * *'
  workflow_dispatch: {}

concurrency:
  group: ninja-refresh
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    env:
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - name: Refresh ninja prices (Mirage)
        run: npx tsx src/refresh-ninja-prices.ts "Mirage"

      - name: Refresh ninja prices (Hardcore Mirage)
        run: npx tsx src/refresh-ninja-prices.ts "Hardcore Mirage"

      - name: Refresh ninja prices (Standard)
        run: npx tsx src/refresh-ninja-prices.ts "Standard"

      - name: Refresh ninja prices (Hardcore)
        run: npx tsx src/refresh-ninja-prices.ts "Hardcore"
